<!-- TODO Componentize: Extraer esta barra de navegación a un componente independiente (p. ej., AppHeader o TopNavBar) -->
<header class="bg-primary text-on-primary top-0 shadow-sm border-b border-outline-variant z-50 sticky transition-all">
    <div class="flex justify-between items-center w-full px-gutter max-w-container-max mx-auto h-16">
        <div class="flex items-center gap-sm">
            <span class="material-symbols-outlined">bolt</span>
            <span class="text-headline-md font-headline-md font-bold tracking-tight text-white">
                Plataformas Especiales
            </span>
        </div>
        <nav class="hidden md:flex items-center gap-md h-full" aria-label="Navegación principal">
            <a class="text-white font-semibold border-b-2 border-secondary-fixed text-body-lg h-full flex items-center px-xs hover:text-white/90 transition-colors"
                href="#">
                Transacciones
            </a>
        </nav>
        <div class="flex items-center gap-sm">
            <button
                (click)="logout()"
                class="ml-sm px-sm py-xs bg-white/10 hover:bg-white/20 text-white border border-white/20 rounded-lg font-label-caps text-label-caps transition-all active:scale-95 cursor-pointer">
                Cerrar Sesión
            </button>
        </div>
    </div>
</header>
